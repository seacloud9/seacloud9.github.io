<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brendon Smith — Neural Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--fg:#f5f5f7;--fg2:rgba(245,245,247,.65);--fg3:rgba(245,245,247,.35);--accent:#00d9ff;--secondary:#ff006e;--tertiary:#8338ec;--glow:rgba(0,217,255,.15);--card-bg:rgba(255,255,255,.03);--card-border:rgba(255,255,255,.08);--line:rgba(255,255,255,.05);--display:'DM Sans',sans-serif;--serif:'DM Serif Display',serif;--mono:'JetBrains Mono',monospace}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--display);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#webgl-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.6}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:150px}
.scroll-content{position:relative;z-index:10}
nav{position:fixed;top:0;left:0;width:100%;padding:24px 48px;display:flex;justify-content:space-between;align-items:center;z-index:200;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);transition:padding .3s}
.logo{font-family:var(--display);font-size:18px;font-weight:700;color:var(--fg);letter-spacing:-.01em}
.nav-mid{display:flex;gap:32px;list-style:none}
.nav-mid a{color:var(--fg2);text-decoration:none;font-size:13px;font-weight:500;letter-spacing:.02em;transition:color .3s;position:relative}
.nav-mid a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--accent);transition:width .3s}
.nav-mid a:hover{color:var(--accent)}
.nav-mid a:hover::after{width:100%}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:8px;background:none;border:none}
.hamburger span{display:block;width:20px;height:2px;background:var(--fg);transition:all .3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;flex-direction:column;justify-content:center;align-items:center;gap:24px;opacity:0;pointer-events:none;transition:opacity .4s}
.mobile-overlay.open{opacity:1;pointer-events:all}
.mobile-overlay a{font-family:var(--display);font-size:28px;font-weight:700;color:var(--fg);text-decoration:none;opacity:0;transform:translateY(12px);transition:all .4s}
.mobile-overlay.open a{opacity:1;transform:translateY(0)}
.mobile-overlay.open a:nth-child(1){transition-delay:.05s}
.mobile-overlay.open a:nth-child(2){transition-delay:.1s}
.mobile-overlay.open a:nth-child(3){transition-delay:.15s}
.mobile-overlay.open a:nth-child(4){transition-delay:.2s}
.mobile-overlay.open a:nth-child(5){transition-delay:.25s}
.mobile-overlay a:hover{color:var(--accent)}
.hero{min-height:100vh;display:flex;align-items:center;padding:120px 48px 80px;position:relative}
.hero-content{max-width:1400px;margin:0 auto;width:100%}
.hero-tag{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:24px;opacity:0;animation:fadeUp .8s ease .4s forwards}
.hero-h{font-family:var(--display);font-size:clamp(48px,10vw,120px);font-weight:700;line-height:.95;letter-spacing:-.04em;margin-bottom:28px;opacity:0;animation:fadeUp 1s ease .6s forwards}
.hero-h .gradient-text{background:linear-gradient(135deg,var(--accent),var(--secondary),var(--tertiary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-family:var(--serif);font-size:clamp(20px,3vw,32px);font-style:italic;color:var(--fg2);max-width:800px;line-height:1.5;opacity:0;animation:fadeUp .9s ease .8s forwards}
.section{padding:100px 0;position:relative}
.container{max-width:1400px;margin:0 auto;padding:0 48px}
.glass{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:24px;padding:56px 48px}
.section-label{font-family:var(--mono);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:inline-block}
.section-title{font-family:var(--display);font-size:clamp(36px,6vw,64px);font-weight:700;line-height:1.1;margin-bottom:32px;letter-spacing:-.03em}
.section-title .italic{font-family:var(--serif);font-style:italic;font-weight:400}
.body-text{font-size:18px;line-height:1.7;color:var(--fg2);margin-bottom:20px}
.body-text strong{color:var(--fg);font-weight:600}
.about-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:80px;align-items:start}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:40px}
.stat-card{background:var(--card-bg);border:1px solid var(--card-border);padding:32px 24px;border-radius:16px;transition:all .4s}
.stat-card:hover{border-color:var(--accent);box-shadow:0 0 24px var(--glow);transform:translateY(-2px)}
.stat-value{font-family:var(--display);font-size:48px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:8px}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg3)}
.exp-item{padding:36px 0;border-top:1px solid var(--line);display:grid;grid-template-columns:140px 1fr;gap:32px;transition:all .4s;cursor:pointer}
.exp-item:last-child{border-bottom:1px solid var(--line)}
.exp-item:hover{padding-left:16px;background:linear-gradient(90deg,rgba(0,217,255,.02),transparent)}
.exp-date{font-family:var(--mono);font-size:11px;color:var(--fg3);padding-top:4px}
.exp-role{font-family:var(--display);font-size:20px;font-weight:700;margin-bottom:4px}
.exp-company{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--accent);margin-bottom:12px}
.exp-desc{font-size:15px;line-height:1.7;color:var(--fg2);max-width:600px}
.exp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.exp-tags span{font-family:var(--mono);font-size:9px;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(0,217,255,.2);color:var(--accent);border-radius:12px;background:rgba(0,217,255,.05)}
.marquee-wrapper{overflow:hidden;padding:28px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.marquee-track{display:flex;gap:40px;animation:scroll 30s linear infinite;width:max-content}
.marquee-item{font-family:var(--display);font-size:clamp(24px,4vw,48px);font-weight:700;white-space:nowrap;color:rgba(245,245,247,.04);transition:color .3s}
.marquee-item:hover{color:var(--accent)}
.marquee-dot{color:var(--accent);opacity:.15;font-size:16px;align-self:center}
.project-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:48px}
.project-card{background:var(--card-bg);border:1px solid var(--card-border);padding:48px 40px;border-radius:20px;transition:all .5s;cursor:pointer;position:relative;overflow:hidden}
.project-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--accent),var(--secondary),var(--tertiary));transform:scaleX(0);transform-origin:left;transition:transform .5s}
.project-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.3)}
.project-card:hover::before{transform:scaleX(1)}
.project-number{font-family:var(--display);font-size:56px;font-weight:700;color:rgba(0,217,255,.08);line-height:1;margin-bottom:12px}
.project-name{font-family:var(--display);font-size:24px;font-weight:700;margin-bottom:4px}
.project-org{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--secondary);margin-bottom:16px}
.project-desc{font-size:15px;line-height:1.7;color:var(--fg2)}
.project-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.project-tags span{font-family:var(--mono);font-size:9px;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(131,56,236,.2);color:var(--tertiary);border-radius:12px;background:rgba(131,56,236,.05)}
.oss-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.oss-card{background:var(--card-bg);border:1px solid var(--card-border);padding:36px 28px;border-radius:20px;text-decoration:none;color:var(--fg);display:block;transition:all .5s}
.oss-card:hover{border-color:var(--accent);box-shadow:0 0 30px var(--glow);transform:translateY(-4px)}
.oss-badge{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;background:var(--accent);color:var(--bg);border-radius:12px;margin-bottom:16px;font-weight:600}
.oss-icon{font-size:32px;margin-bottom:12px}
.oss-name{font-family:var(--display);font-size:22px;font-weight:700;margin-bottom:4px}
.oss-tagline{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--accent);margin-bottom:14px}
.oss-desc{font-size:13px;line-height:1.7;color:var(--fg2);margin-bottom:12px}
.oss-stats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.oss-stats span{font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid var(--line);color:var(--fg3);border-radius:12px}
.oss-link{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
.cta-title{font-family:var(--display);font-size:clamp(48px,9vw,96px);font-weight:700;line-height:1;margin-bottom:48px}
.cta-title .italic{font-family:var(--serif);font-style:italic;font-weight:400}
.contact-links{display:flex;gap:12px;flex-wrap:wrap}
.contact-link{text-decoration:none;color:var(--fg2);font-size:13px;font-weight:600;letter-spacing:.02em;padding:14px 28px;border:1px solid var(--card-border);border-radius:12px;background:var(--card-bg);transition:all .3s}
.contact-link:hover{color:var(--accent);border-color:var(--accent);box-shadow:0 0 20px var(--glow)}
footer{padding:40px 48px;display:flex;justify-content:space-between;font-size:11px;color:var(--fg3);border-top:1px solid var(--line)}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes scroll{to{transform:translateX(-50%)}}
.reveal{opacity:0;transform:translateY(24px);transition:all .9s cubic-bezier(.19,1,.22,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
@media(max-width:1024px){.about-grid{grid-template-columns:1fr;gap:48px}.oss-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  nav{padding:20px 24px}
  .hamburger{display:flex}
  .nav-mid{display:none}
  .mobile-overlay{display:flex}
  .hero{padding:100px 24px 60px}
  .container{padding:0 24px}
  .glass{padding:32px 24px;border-radius:16px}
  .section{padding:60px 0}
  .about-grid{gap:32px}
  .stats{grid-template-columns:1fr 1fr;gap:12px}
  .exp-item{grid-template-columns:1fr;gap:8px;padding:28px 0}
  .exp-date{margin-bottom:4px}
  .project-grid,.oss-grid{grid-template-columns:1fr;gap:16px}
  .project-card{padding:36px 28px}
  .oss-card{padding:28px 20px}
  .contact-links{flex-direction:column}
  .contact-link{text-align:center}
  footer{padding:28px 24px;flex-direction:column;gap:8px;text-align:center}
}
@media(max-width:480px){
  .hero{padding:80px 20px 40px}
  .container{padding:0 20px}
  .glass{padding:24px 20px}
  .section{padding:40px 0}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Neural network visualization background
(()=>{
const canvas=document.getElementById('webgl-bg');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000,0);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z=50;

// Create neural network nodes
const nodeCount=window.innerWidth<768?30:50;
const nodes=[];
const nodeGeometry=new THREE.SphereGeometry(0.3,16,16);

for(let i=0;i<nodeCount;i++){
  const material=new THREE.MeshBasicMaterial({
    color:i%3===0?0x00d9ff:i%3===1?0xff006e:0x8338ec,
    transparent:true,
    opacity:0.6
  });

  const node=new THREE.Mesh(nodeGeometry,material);
  node.position.set(
    (Math.random()-0.5)*80,
    (Math.random()-0.5)*60,
    (Math.random()-0.5)*30
  );

  nodes.push({
    mesh:node,
    velocity:new THREE.Vector3(
      (Math.random()-0.5)*0.1,
      (Math.random()-0.5)*0.1,
      (Math.random()-0.5)*0.05
    ),
    originalColor:material.color.clone()
  });

  scene.add(node);
}

// Create connections between nodes
const lineMaterial=new THREE.LineBasicMaterial({
  color:0x00d9ff,
  transparent:true,
  opacity:0.1
});

const lineGeometry=new THREE.BufferGeometry();
const maxConnections=nodeCount*3;
const positions=new Float32Array(maxConnections*6);
lineGeometry.setAttribute('position',new THREE.BufferAttribute(positions,3));

const lines=new THREE.LineSegments(lineGeometry,lineMaterial);
scene.add(lines);

// Animation
let scrollY=0;
addEventListener('scroll',()=>scrollY=window.pageYOffset);
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

function animate(){
  requestAnimationFrame(animate);

  const time=performance.now()*0.0001;
  const maxScroll=Math.max(1,document.body.scrollHeight-innerHeight);
  const scrollFactor=scrollY/maxScroll;

  // Update nodes
  const bounds={x:40,y:30,z:15};
  nodes.forEach((node,i)=>{
    node.mesh.position.add(node.velocity);

    if(Math.abs(node.mesh.position.x)>bounds.x)node.velocity.x*=-1;
    if(Math.abs(node.mesh.position.y)>bounds.y)node.velocity.y*=-1;
    if(Math.abs(node.mesh.position.z)>bounds.z)node.velocity.z*=-1;

    node.mesh.scale.setScalar(1+Math.sin(time*2+i)*0.2);
  });

  // Update connections
  const linePositions=lineGeometry.attributes.position.array;
  let connectionIndex=0;

  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dist=nodes[i].mesh.position.distanceTo(nodes[j].mesh.position);

      if(dist<20&&connectionIndex<maxConnections){
        linePositions[connectionIndex*6]=nodes[i].mesh.position.x;
        linePositions[connectionIndex*6+1]=nodes[i].mesh.position.y;
        linePositions[connectionIndex*6+2]=nodes[i].mesh.position.z;
        linePositions[connectionIndex*6+3]=nodes[j].mesh.position.x;
        linePositions[connectionIndex*6+4]=nodes[j].mesh.position.y;
        linePositions[connectionIndex*6+5]=nodes[j].mesh.position.z;
        connectionIndex++;
      }
    }
  }

  lineGeometry.setDrawRange(0,connectionIndex*2);
  lineGeometry.attributes.position.needsUpdate=true;

  // Camera movement
  camera.position.x=Math.sin(time*0.3)*5;
  camera.position.y=-scrollFactor*20;
  camera.lookAt(0,-scrollFactor*15,0);

  renderer.render(scene,camera);
}

animate();
})();

// Scroll reveal
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
},{threshold:0.1});

document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

// Mobile menu
const hamburger=document.getElementById('hamburger');
const mobileMenu=document.getElementById('mobileMenu');

hamburger.addEventListener('click',()=>{
  hamburger.classList.toggle('open');
  mobileMenu.classList.toggle('open');
  document.body.style.overflow=mobileMenu.classList.contains('open')?'hidden':'';
});

mobileMenu.querySelectorAll('.mob-link').forEach(link=>{
  link.addEventListener('click',e=>{
    e.preventDefault();
    hamburger.classList.remove('open');
    mobileMenu.classList.remove('open');
    document.body.style.overflow='';
    document.querySelector(link.getAttribute('href'))?.scrollIntoView({behavior:'smooth'});
  });
});

document.querySelectorAll('nav a[href^="#"]').forEach(link=>{
  link.addEventListener('click',e=>{
    e.preventDefault();
    document.querySelector(link.getAttribute('href'))?.scrollIntoView({behavior:'smooth'});
  });
});
</script>
