<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brendon Smith — Storm Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,300;1,6..72,400&family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--fg:#eee8dc;--fg2:rgba(238,232,220,.6);--fg3:rgba(238,232,220,.3);--accent:#e84118;--card-bg:rgba(255,255,255,.04);--card-border:rgba(255,255,255,.07);--line:rgba(255,255,255,.06);--display:'Bebas Neue',sans-serif;--serif:'Newsreader',serif;--mono:'IBM Plex Mono',monospace}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#weather-badge{position:fixed;top:100px;right:24px;z-index:100;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);background:rgba(0,0,0,.4);backdrop-filter:blur(10px);padding:10px 16px;border-radius:8px;border:1px solid var(--line);text-align:right;line-height:1.6}
#weather-badge .temp{font-family:var(--display);font-size:28px;color:var(--fg);display:block;line-height:1}
#weather-badge .cond{color:var(--accent)}
.scroll-content{position:relative;z-index:10}
nav{position:fixed;top:0;left:0;width:100%;padding:20px 48px;display:flex;justify-content:space-between;align-items:center;z-index:200;background:rgba(26,26,46,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.logo{font-family:var(--display);font-size:28px;letter-spacing:.06em;color:var(--accent)}
.nav-mid{display:flex;gap:32px;list-style:none}
.nav-mid a{color:var(--fg2);text-decoration:none;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;transition:color .3s}
.nav-mid a:hover{color:var(--accent)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
.hamburger span{display:block;width:22px;height:2px;background:var(--fg);transition:all .3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;flex-direction:column;justify-content:center;align-items:center;gap:24px;opacity:0;pointer-events:none;transition:opacity .35s}
.mobile-overlay.open{opacity:1;pointer-events:all}
.mobile-overlay a{font-family:var(--display);font-size:36px;color:var(--fg);text-decoration:none;opacity:0;transform:translateY(12px);transition:all .4s}
.mobile-overlay.open a{opacity:1;transform:translateY(0)}
.mobile-overlay.open a:nth-child(1){transition-delay:.05s}.mobile-overlay.open a:nth-child(2){transition-delay:.1s}.mobile-overlay.open a:nth-child(3){transition-delay:.15s}.mobile-overlay.open a:nth-child(4){transition-delay:.2s}.mobile-overlay.open a:nth-child(5){transition-delay:.25s}
.mobile-overlay a:hover{color:var(--accent)}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 80px;position:relative}
.hero-tag{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;opacity:0;animation:fu .7s ease .4s forwards}
.hero-h{font-family:var(--display);font-size:clamp(72px,16vw,200px);line-height:.85;letter-spacing:.02em;text-transform:uppercase;opacity:0;transform:translateY(40px);animation:fu 1s ease .6s forwards}
.hero-h .gl{color:var(--accent)}
.hero-h .it{font-family:var(--serif);font-style:italic;font-weight:300;text-transform:none}
.hero-sub{font-family:var(--serif);font-size:clamp(17px,2.2vw,24px);color:var(--fg2);margin-top:28px;max-width:560px;line-height:1.6;opacity:0;animation:fu .8s ease .9s forwards}
.section{padding:120px 0}
.container{max-width:1200px;margin:0 auto;padding:0 48px}
.glass{background:var(--card-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:16px;padding:56px 48px}
.slbl{font-family:var(--mono);font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.sh{font-family:var(--display);font-size:clamp(36px,6vw,72px);line-height:1;margin-bottom:36px;text-transform:uppercase;letter-spacing:.02em}
.sh .it{font-family:var(--serif);font-style:italic;font-weight:300;text-transform:none}
.bt{font-family:var(--serif);font-size:18px;line-height:1.8;color:var(--fg2);margin-bottom:20px}
.bt strong{color:var(--fg);font-weight:600}
.about-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:80px;align-items:start}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:40px}
.st{background:var(--card-bg);border:1px solid var(--card-border);padding:28px 20px;border-radius:10px;transition:all .3s}
.st:hover{border-color:var(--accent)}
.st-v{font-family:var(--display);font-size:48px;line-height:1;color:var(--accent)}
.st-l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);margin-top:8px}
.exp-item{padding:32px 0;border-top:1px solid var(--line);display:grid;grid-template-columns:150px 1fr;gap:32px;transition:all .3s;cursor:pointer}
.exp-item:last-child{border-bottom:1px solid var(--line)}
.exp-item:hover{padding-left:16px;background:linear-gradient(90deg,rgba(232,65,24,.03),transparent)}
.exp-d{font-family:var(--mono);font-size:10px;color:var(--fg3);padding-top:4px}
.exp-r{font-family:var(--display);font-size:24px;text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px}
.exp-c{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--accent);margin-bottom:10px}
.exp-t{font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--fg2);max-width:520px}
.exp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.exp-tags span{font-family:var(--mono);font-size:8px;text-transform:uppercase;padding:3px 8px;border:1px solid rgba(232,65,24,.2);color:var(--accent);border-radius:4px}
.mq-w{overflow:hidden;padding:28px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.mq-w+.mq-w{border-top:none}
.mq-t{display:flex;gap:36px;animation:mq 25s linear infinite;width:max-content}
.mq-t.rv{animation-direction:reverse;animation-duration:30s}
.mq-s{font-family:var(--display);font-size:clamp(28px,5vw,56px);white-space:nowrap;color:rgba(238,232,220,.05);text-transform:uppercase;transition:color .3s}
.mq-s:hover{color:var(--accent)}
.mq-d{color:var(--accent);opacity:.2;font-size:18px;align-self:center}
.pj-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:48px}
.pj{background:var(--card-bg);border:1px solid var(--card-border);padding:44px 36px;border-radius:14px;transition:all .4s;cursor:pointer;position:relative;overflow:hidden}
.pj::after{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .4s}
.pj:hover{border-color:var(--accent);transform:translateY(-4px)}.pj:hover::after{transform:scaleX(1)}
.pj-n{font-family:var(--display);font-size:64px;color:rgba(232,65,24,.08);line-height:1;margin-bottom:12px}
.pj-name{font-family:var(--display);font-size:24px;text-transform:uppercase;margin-bottom:4px}
.pj-org{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--accent);margin-bottom:14px}
.pj-desc{font-family:var(--serif);font-size:14px;line-height:1.75;color:var(--fg2)}
.pj-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:16px}
.pj-tags span{font-family:var(--mono);font-size:8px;text-transform:uppercase;padding:3px 8px;border:1px solid var(--line);color:var(--fg3);border-radius:4px}
.pj:hover .pj-tags span{border-color:var(--accent);color:var(--accent)}
.oss-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.oss-card{background:var(--card-bg);border:1px solid var(--card-border);padding:36px 28px;border-radius:14px;text-decoration:none;color:var(--fg);display:block;transition:all .4s}
.oss-card:hover{border-color:var(--accent);transform:translateY(-4px)}
.oss-badge{display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;background:var(--accent);color:#fff;border-radius:4px;margin-bottom:16px}
.oss-icon{font-size:28px;margin-bottom:12px}
.oss-name{font-family:var(--display);font-size:22px;text-transform:uppercase;margin-bottom:4px}
.oss-tagline{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--accent);margin-bottom:14px}
.oss-desc{font-family:var(--serif);font-size:12px;line-height:1.75;color:var(--fg2);margin-bottom:14px}
.oss-stats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.oss-stats span{font-family:var(--mono);font-size:8px;padding:3px 8px;border:1px solid var(--line);color:var(--fg3);border-radius:4px}
.oss-link{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-top:12px}
.cta-h{font-family:var(--display);font-size:clamp(48px,10vw,130px);line-height:.9;text-transform:uppercase;margin-bottom:40px}
.cta-h .it{font-family:var(--serif);font-style:italic;font-weight:300;text-transform:none}
.cta-h .gl{color:var(--accent)}
.clinks{display:flex;gap:32px;flex-wrap:wrap}
.cl{text-decoration:none;color:var(--fg2);font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:14px 0;border-bottom:1px solid var(--line);transition:all .3s;display:flex;align-items:center;gap:8px}
.cl:hover{color:var(--accent);border-bottom-color:var(--accent)}
footer{padding:40px 48px;display:flex;justify-content:space-between;font-size:9px;color:var(--fg3);letter-spacing:.1em;border-top:1px solid var(--line)}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
@keyframes mq{to{transform:translateX(-50%)}}
.rv-el{opacity:0;transform:translateY(24px);transition:all .8s ease}
.rv-el.vis{opacity:1;transform:translateY(0)}
@media(max-width:1080px){.container{padding:0 32px}.about-grid{gap:48px}.oss-grid{grid-template-columns:1fr 1fr}.glass{padding:40px 32px}}
@media(max-width:768px){
  .hamburger{display:flex}.nav-mid{display:none}.mobile-overlay{display:flex}
  nav{padding:16px 20px}.container{padding:0 20px}.hero{padding:0 20px 60px}
  .hero-h{font-size:clamp(48px,14vw,80px)}.hero-sub{font-size:16px;max-width:100%}
  .glass{padding:28px 20px;border-radius:12px}
  .section{padding:80px 0}.about-grid{grid-template-columns:1fr;gap:32px}.stats{grid-template-columns:1fr 1fr;gap:8px}
  .exp-item{grid-template-columns:1fr;gap:4px;padding:24px 0}.exp-d{margin-bottom:4px;color:var(--accent)}
  .pj-grid,.oss-grid{grid-template-columns:1fr;gap:14px}
  .clinks{flex-direction:column;gap:0}.cta-h{font-size:clamp(36px,10vw,56px)}
  footer{padding:24px 20px;flex-direction:column;gap:8px;text-align:center}
  .sh{font-size:clamp(28px,8vw,48px)}.pj{padding:32px 24px}.oss-card{padding:28px 20px}
  #weather-badge{top:auto;bottom:20px;right:16px;left:16px;text-align:center;font-size:9px}
  #weather-badge .temp{font-size:22px;display:inline}
}
@media(max-width:480px){.hero{padding:0 16px 48px}.hero-h{font-size:clamp(40px,13vw,60px)}.container{padding:0 16px}.section{padding:60px 0}.glass{padding:22px 16px}.sh{font-size:clamp(24px,7vw,36px)}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// STORM SCENE v3 — POST-PROCESSED CINEMATIC RAIN OVER SF SKYLINE
// Line-geometry rain, bloom, chromatic aberration, motion blur,
// SF silhouette, forked lightning, volumetric clouds, wet ground
// ═══════════════════════════════════════════════════════════════
(()=>{
const W=innerWidth,H=innerHeight,DPR=Math.min(devicePixelRatio,2);
const canvas=document.getElementById('c');
const R=new THREE.WebGLRenderer({canvas,antialias:false});
R.setSize(W,H);R.setPixelRatio(DPR);
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=.85;
R.autoClear=false;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x080812,.006);
const cam=new THREE.PerspectiveCamera(55,W/H,.1,500);
cam.position.set(0,6,22);cam.lookAt(0,3,-30);

// ════════════════════════════════════════
// POST-PROCESSING: Bloom + Chromatic Aberration + Motion Blur
// ════════════════════════════════════════
const rtScene=new THREE.WebGLRenderTarget(W*DPR,H*DPR,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,format:THREE.RGBAFormat,type:THREE.HalfFloatType});
const rtBright=new THREE.WebGLRenderTarget(Math.floor(W*DPR/2),Math.floor(H*DPR/2),{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});
const rtBlurH=new THREE.WebGLRenderTarget(Math.floor(W*DPR/4),Math.floor(H*DPR/4),{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});
const rtBlurV=new THREE.WebGLRenderTarget(Math.floor(W*DPR/4),Math.floor(H*DPR/4),{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});
const rtBlur2H=new THREE.WebGLRenderTarget(Math.floor(W*DPR/8),Math.floor(H*DPR/8),{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});
const rtBlur2V=new THREE.WebGLRenderTarget(Math.floor(W*DPR/8),Math.floor(H*DPR/8),{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});
const rtPrev=new THREE.WebGLRenderTarget(W*DPR,H*DPR,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter,format:THREE.RGBAFormat});

const fsGeo=new THREE.PlaneGeometry(2,2);
const ppScene=new THREE.Scene();
const ppCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const ppQuad=new THREE.Mesh(fsGeo);ppScene.add(ppQuad);

// Bright pass
const brightMat=new THREE.ShaderMaterial({
  uniforms:{tDiffuse:{value:null},uThreshold:{value:.25}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform float uThreshold;varying vec2 vUv;
    void main(){vec4 c=texture2D(tDiffuse,vUv);float l=dot(c.rgb,vec3(.2126,.7152,.0722));gl_FragColor=l>uThreshold?c*1.5:vec4(0.);}`
});
// Gaussian blur
function mkBlur(horiz){return new THREE.ShaderMaterial({
  uniforms:{tDiffuse:{value:null},uRes:{value:new THREE.Vector2()}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform vec2 uRes;varying vec2 vUv;
    void main(){vec2 px=1./uRes;vec2 d=${horiz?'vec2(px.x,0.)':'vec2(0.,px.y)'};
    vec4 c=texture2D(tDiffuse,vUv)*.227027;
    c+=texture2D(tDiffuse,vUv+d)*.1945946+texture2D(tDiffuse,vUv-d)*.1945946;
    c+=texture2D(tDiffuse,vUv+d*2.)*.1216216+texture2D(tDiffuse,vUv-d*2.)*.1216216;
    c+=texture2D(tDiffuse,vUv+d*3.)*.054054+texture2D(tDiffuse,vUv-d*3.)*.054054;
    c+=texture2D(tDiffuse,vUv+d*4.)*.016216+texture2D(tDiffuse,vUv-d*4.)*.016216;
    gl_FragColor=c;}`
});}
const blurH=mkBlur(true),blurV=mkBlur(false),blur2H=mkBlur(true),blur2V=mkBlur(false);

// Final composite: bloom + CA + motion blur + grain + vignette
const compositeMat=new THREE.ShaderMaterial({
  uniforms:{tScene:{value:null},tBloom1:{value:null},tBloom2:{value:null},tPrev:{value:null},uT:{value:0},uFlash:{value:0}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.);}`,
  fragmentShader:`
    uniform sampler2D tScene,tBloom1,tBloom2,tPrev;
    uniform float uT,uFlash;varying vec2 vUv;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    void main(){
      vec2 uv=vUv;
      // Subtle barrel distortion
      vec2 dc=uv-.5;float d2=dot(dc,dc);
      uv+=dc*d2*.06;
      // Chromatic aberration — stronger during flash
      float ca=.0015+uFlash*.003;
      float r=texture2D(tScene,uv+vec2(ca,ca*.3)).r;
      float g=texture2D(tScene,uv).g;
      float b=texture2D(tScene,uv-vec2(ca,ca*.3)).b;
      vec3 scene=vec3(r,g,b);
      // Bloom layers
      vec3 bloom1=texture2D(tBloom1,uv).rgb;
      vec3 bloom2=texture2D(tBloom2,uv).rgb;
      // Motion blur (temporal blend with previous frame)
      vec3 prev=texture2D(tPrev,vUv).rgb;
      scene=mix(scene,prev,.15);
      // Combine
      vec3 col=scene+bloom1*1.4+bloom2*.9;
      // Color grade — push shadows blue, highlights warm
      col=mix(col,col*vec3(.85,.88,1.1),.2);
      col+=vec3(.03,.01,.0)*uFlash; // warm flash tint
      // Rain streak emphasis via bloom
      // Film grain
      float grain=(hash(uv*800.+uT*60.)-.5)*.07;
      col+=grain;
      // Vignette
      float vig=1.-d2*2.2;
      col*=vig;
      // Scanline hint
      col*=.97+.03*sin(gl_FragCoord.y*1.2+uT*3.);
      gl_FragColor=vec4(max(col,0.),1.);
    }`
});

function postProcess(t,flash){
  // 1. Scene → RT
  R.setRenderTarget(rtScene);R.clear();R.render(scene,cam);
  // Copy to prev for motion blur (before composite modifies it)
  // 2. Bright pass
  brightMat.uniforms.tDiffuse.value=rtScene.texture;
  ppQuad.material=brightMat;R.setRenderTarget(rtBright);R.clear();R.render(ppScene,ppCam);
  // 3. Blur pass 1
  blurH.uniforms.tDiffuse.value=rtBright.texture;blurH.uniforms.uRes.value.set(rtBlurH.width,rtBlurH.height);
  ppQuad.material=blurH;R.setRenderTarget(rtBlurH);R.clear();R.render(ppScene,ppCam);
  blurV.uniforms.tDiffuse.value=rtBlurH.texture;blurV.uniforms.uRes.value.set(rtBlurV.width,rtBlurV.height);
  ppQuad.material=blurV;R.setRenderTarget(rtBlurV);R.clear();R.render(ppScene,ppCam);
  // 4. Blur pass 2 (wider)
  blur2H.uniforms.tDiffuse.value=rtBlurV.texture;blur2H.uniforms.uRes.value.set(rtBlur2H.width,rtBlur2H.height);
  ppQuad.material=blur2H;R.setRenderTarget(rtBlur2H);R.clear();R.render(ppScene,ppCam);
  blur2V.uniforms.tDiffuse.value=rtBlur2H.texture;blur2V.uniforms.uRes.value.set(rtBlur2V.width,rtBlur2V.height);
  ppQuad.material=blur2V;R.setRenderTarget(rtBlur2V);R.clear();R.render(ppScene,ppCam);
  // 5. Composite
  compositeMat.uniforms.tScene.value=rtScene.texture;
  compositeMat.uniforms.tBloom1.value=rtBlurV.texture;
  compositeMat.uniforms.tBloom2.value=rtBlur2V.texture;
  compositeMat.uniforms.tPrev.value=rtPrev.texture;
  compositeMat.uniforms.uT.value=t;
  compositeMat.uniforms.uFlash.value=flash;
  ppQuad.material=compositeMat;R.setRenderTarget(null);R.clear();R.render(ppScene,ppCam);
  // Copy current frame for next frame's motion blur
  R.setRenderTarget(rtPrev);R.clear();
  ppQuad.material=new THREE.MeshBasicMaterial({map:rtScene.texture});
  R.render(ppScene,ppCam);
}

// ════════════════════════════════════════
// SKY DOME
// ════════════════════════════════════════
const skyMat=new THREE.ShaderMaterial({
  side:THREE.BackSide,uniforms:{uT:{value:0},uFlash:{value:0}},
  vertexShader:`varying vec3 vD;void main(){vD=normalize(position);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    varying vec3 vD;uniform float uT,uFlash;
    void main(){
      float h=max(vD.y,0.);
      vec3 top=vec3(.01,.01,.04);vec3 mid=vec3(.04,.035,.09);vec3 hor=vec3(.08,.06,.11);
      vec3 col=mix(hor,mix(mid,top,smoothstep(.15,.7,h)),h);
      // Turbulent clouds
      float c1=sin(vD.x*5.+uT*.06)*cos(vD.y*8.+vD.z*4.+uT*.04)*.5+.5;
      float c2=sin(vD.x*12.+uT*.1)*cos(vD.z*8.-uT*.07)*.5+.5;
      float c3=sin(vD.x*3.+vD.z*2.+uT*.03)*cos(vD.y*5.+uT*.02)*.5+.5;
      col+=vec3(.06,.055,.1)*c1*.5;
      col+=vec3(.04,.035,.07)*c2*.3;
      col+=vec3(.05,.04,.08)*c3*.4;
      // Horizon city glow
      float glow=exp(-h*6.);
      col+=vec3(.1,.05,.02)*glow*.5;
      col+=vec3(.06,.03,.1)*glow*.3;
      // Lightning
      col+=vec3(.8,.78,1.)*uFlash*(.2+.8*(1.-h));
      gl_FragColor=vec4(col,1.);
    }`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(180,32,32),skyMat));

// ════════════════════════════════════════
// WET GROUND with puddle reflections
// ════════════════════════════════════════
const groundMat=new THREE.ShaderMaterial({
  uniforms:{uT:{value:0},uFlash:{value:0}},
  vertexShader:`varying vec2 vUv;varying vec3 vP;void main(){vUv=uv;vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    varying vec2 vUv;varying vec3 vP;uniform float uT,uFlash;
    float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float n2d(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);}
    void main(){
      vec3 base=vec3(.02,.02,.04);
      base+=n2d(vUv*50.)*.02+n2d(vUv*100.)*.01;
      // Puddles
      float p=smoothstep(.52,.58,n2d(vUv*7.+.3));
      float r1=sin(length(vP.xz*1.5-vec2(sin(uT*.2)*3.,cos(uT*.15)*2.))*5.-uT*4.)*.5+.5;
      float r2=sin(length(vP.xz*1.2-vec2(-4.,3.))*7.-uT*5.)*.5+.5;
      p*=(r1*.3+r2*.3+.4);
      vec3 refl=vec3(.04,.03,.08)+vec3(.7,.68,.9)*uFlash*.5;
      refl+=vec3(.08,.04,.02)*exp(-abs(vP.z)*.015);
      base=mix(base,refl,p*.7);
      base=mix(base,vec3(.03,.025,.06),smoothstep(15.,50.,length(vP.xz)));
      gl_FragColor=vec4(base,1.);
    }`
});
const ground=new THREE.Mesh(new THREE.PlaneGeometry(140,140),groundMat);
ground.rotation.x=-Math.PI/2;ground.position.y=-.5;scene.add(ground);

// ════════════════════════════════════════
// RAIN — LINE GEOMETRY (true streaks, not points)
// Each raindrop is a short line segment
// ════════════════════════════════════════
const RAIN=6000;
const rainGeo=new THREE.BufferGeometry();
const rPos=new Float32Array(RAIN*6); // 2 vertices per line (start + end)
const rSpeed=new Float32Array(RAIN);
const rWind=new Float32Array(RAIN);
const DROP_LEN=.8; // streak length

for(let i=0;i<RAIN;i++){
  const x=(Math.random()-.5)*70;
  const y=Math.random()*55;
  const z=(Math.random()-.5)*70-5;
  const spd=.5+Math.random()*.8;
  const w=(Math.random()-.5)*.04;
  rSpeed[i]=spd; rWind[i]=w;
  const i6=i*6;
  // Line start (top of streak)
  rPos[i6]=x; rPos[i6+1]=y; rPos[i6+2]=z;
  // Line end (bottom of streak — offset by speed direction)
  rPos[i6+3]=x+w*DROP_LEN*8; rPos[i6+4]=y+DROP_LEN; rPos[i6+5]=z;
}
rainGeo.setAttribute('position',new THREE.BufferAttribute(rPos,3));
const rainMat=new THREE.ShaderMaterial({
  uniforms:{uFlash:{value:0}},
  vertexShader:`varying float vD;
    void main(){
      vec4 mv=modelViewMatrix*vec4(position,1.);
      vD=-mv.z;
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    varying float vD;uniform float uFlash;
    void main(){
      vec3 col=vec3(.55,.6,.8)+vec3(.4,.35,.5)*uFlash;
      float alpha=smoothstep(90.,5.,vD)*.4;
      gl_FragColor=vec4(col,alpha);
    }`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
const rain=new THREE.LineSegments(rainGeo,rainMat);
scene.add(rain);

// ════════════════════════════════════════
// SPLASH RINGS at ground level
// ════════════════════════════════════════
const SPLASHES=500;
const sGeo=new THREE.BufferGeometry();
const sP=new Float32Array(SPLASHES*3),sLf=new Float32Array(SPLASHES);
for(let i=0;i<SPLASHES;i++){
  sP[i*3]=(Math.random()-.5)*50;sP[i*3+1]=-.3;sP[i*3+2]=(Math.random()-.5)*50-5;
  sLf[i]=Math.random();
}
sGeo.setAttribute('position',new THREE.BufferAttribute(sP,3));
sGeo.setAttribute('life',new THREE.BufferAttribute(sLf,1));
const splashMat=new THREE.ShaderMaterial({
  uniforms:{uT:{value:0}},
  vertexShader:`attribute float life;varying float vL;uniform float uT;
    void main(){vL=fract(life+uT*1.2);vec4 mv=modelViewMatrix*vec4(position+vec3(0.,vL*.2,0.),1.);
    gl_PointSize=mix(5.,1.,vL)*(80./-mv.z);gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`varying float vL;
    void main(){float d=length(gl_PointCoord-.5);float ring=smoothstep(.25,.32,d)*smoothstep(.5,.43,d);
    float core=exp(-d*d*25.);float a=(ring*.5+core*.3)*(1.-vL)*(1.-vL);
    gl_FragColor=vec4(.5,.55,.75,a*.5);}`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(sGeo,splashMat));

// ════════════════════════════════════════
// VOLUMETRIC CLOUD LAYERS (3 depth layers)
// ════════════════════════════════════════
const cloudLayers=[];
for(let L=0;L<3;L++){
  const N=25+L*12;
  const cG=new THREE.BufferGeometry();
  const cP=new Float32Array(N*3),cS=new Float32Array(N);
  for(let i=0;i<N;i++){
    cP[i*3]=(Math.random()-.5)*120;
    cP[i*3+1]=20+L*10+Math.random()*8;
    cP[i*3+2]=-20-Math.random()*50;
    cS[i]=12+Math.random()*22;
  }
  cG.setAttribute('position',new THREE.BufferAttribute(cP,3));
  cG.setAttribute('size',new THREE.BufferAttribute(cS,1));
  const cM=new THREE.ShaderMaterial({
    uniforms:{uT:{value:0},uFlash:{value:0},uL:{value:L}},
    vertexShader:`attribute float size;uniform float uT,uL;varying float vL;
      void main(){vL=uL;vec3 p=position;p.x+=uT*(.6+uL*.25);p.x=mod(p.x+60.,120.)-60.;
      vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=size*(500./-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`varying float vL;uniform float uFlash,uL;
      void main(){float d=length(gl_PointCoord-.5);float s=exp(-d*d*1.8);
      float b=.05+uL*.025;vec3 c=vec3(b,b*.9,b*1.3);
      c+=vec3(.55,.5,.75)*uFlash*(1.-uL*.3)*.5;
      c+=vec3(.06,.03,.01)*smoothstep(.3,.55,gl_PointCoord.y)*.3;
      gl_FragColor=vec4(c,s*.3*(1.-uL*.12));}`,
    transparent:true,depthWrite:false,blending:THREE.NormalBlending
  });
  scene.add(new THREE.Points(cG,cM));cloudLayers.push(cM);
}

// ════════════════════════════════════════
// SAN FRANCISCO SKYLINE — recognizable landmarks
// ════════════════════════════════════════
function buildSF(){
  const v=[], Z=-50;
  // Helper: box
  function box(x,w,h){
    const l=x-w/2,r=x+w/2;
    v.push(l,0,Z, r,0,Z, r,h,Z, l,0,Z, r,h,Z, l,h,Z);
  }
  // Helper: triangle (for Transamerica)
  function tri(x,w,h){
    v.push(x-w/2,0,Z, x+w/2,0,Z, x,h,Z);
  }

  // Far left — Oakland hills (low bumps)
  for(let i=-55;i<-30;i+=2) box(i,1.8, 1.5+Math.sin(i*.4)*1+Math.random()*.5);

  // Bay Bridge towers
  box(-28,1,12); box(-24,1,12);
  // Bridge cables (as thin boxes between towers)
  box(-26,.15,9); box(-26.5,.1,7.5); box(-25.5,.1,7.5);

  // Yerba Buena / Treasure Island
  for(let i=-22;i<-18;i+=1.5) box(i,1.2, 1+Math.random());

  // SF Financial District
  box(-14,2.5,6); box(-11,2,8); box(-8.5,1.8,5.5);
  // Salesforce Tower (tallest)
  box(-6,2.2,16);
  // More buildings
  box(-3.5,2,9); box(-1,1.8,7); box(1,2.5,10); box(3.5,1.5,6.5);
  // Transamerica Pyramid
  tri(6,3.5,14);
  // Coit Tower area
  box(9,1.2,5); box(10.5,1.8,3.5);
  // North Beach / Marina
  for(let i=12;i<22;i+=1.8) box(i,1.5, 2+Math.random()*2.5);
  // Golden Gate Bridge towers (far right)
  box(28,.8,11); box(34,.8,11);
  box(31,.12,8);box(30,.1,6.5);box(32,.1,6.5);
  // Marin headlands
  for(let i=36;i<50;i+=2) box(i,1.8, 1+Math.sin(i*.3)*.8+Math.random()*.5);

  return new Float32Array(v);
}

const sfGeo=new THREE.BufferGeometry();
sfGeo.setAttribute('position',new THREE.BufferAttribute(buildSF(),3));
sfGeo.computeVertexNormals();
const sfMat=new THREE.ShaderMaterial({
  uniforms:{uT:{value:0},uFlash:{value:0}},
  vertexShader:`varying vec3 vP;varying vec3 vN;void main(){vP=position;vN=normal;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    varying vec3 vP;varying vec3 vN;uniform float uT,uFlash;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    void main(){
      vec3 col=vec3(.015,.015,.03);
      // Lit face detection for lightning
      float facing=max(dot(normalize(vN),vec3(0.,0.,1.)),0.);
      col+=vec3(.12,.1,.18)*uFlash*facing*.6;
      // Window lights — grid pattern
      float wx=floor(vP.x*4.+.5);float wy=floor(vP.y*5.+.5);
      float winOn=step(.55,h(vec2(wx,wy)));
      float flicker=step(.4,h(vec2(wx,wy+floor(uT*.3))));
      float winBright=winOn*flicker*(1.-smoothstep(0.,14.,vP.y)*.5);
      // Warm window glow
      vec3 winCol=mix(vec3(.9,.7,.3),vec3(.7,.8,1.),h(vec2(wx*1.1,wy*.9)));
      col+=winCol*winBright*.12;
      // Aircraft warning lights on tall buildings
      if(vP.y>13.){
        float blink=step(.85,sin(uT*3.+vP.x)*.5+.5);
        col+=vec3(1.,.1,.1)*blink*.15;
      }
      gl_FragColor=vec4(col,1.);
    }`
});
scene.add(new THREE.Mesh(sfGeo,sfMat));

// ════════════════════════════════════════
// LIGHTNING BOLTS — procedural forked lines
// ════════════════════════════════════════
let bolts=[];
function createBolt(sx,sy){
  bolts.forEach(b=>{b.forEach(m=>scene.remove(m))});bolts=[];
  const group=[];
  function makeBranch(x,y,z,endY,segs,jitter,thick){
    const pts=[];
    for(let i=0;i<=segs;i++){
      pts.push(new THREE.Vector3(x,y,z));
      const t=i/segs;
      x+=(Math.random()-.5)*jitter*(1.-t*.5);
      y+=(endY-sy)/segs;
      z+=(Math.random()-.5)*.4;
    }
    const geo=new THREE.BufferGeometry().setFromPoints(pts);
    // Main bolt
    const mat=new THREE.LineBasicMaterial({color:0xdddcff,transparent:true,opacity:1,blending:THREE.AdditiveBlending});
    const line=new THREE.Line(geo,mat);scene.add(line);group.push(line);
    // Glow
    const mat2=new THREE.LineBasicMaterial({color:0x8888ff,transparent:true,opacity:.5,blending:THREE.AdditiveBlending});
    const glow=new THREE.Line(geo.clone(),mat2);glow.scale.set(1.15,1,1.15);scene.add(glow);group.push(glow);
    return {pts,lastX:x,lastY:y,lastZ:z};
  }
  const main=makeBranch(sx,sy,-18-Math.random()*10,-.5,15+Math.floor(Math.random()*8),4,2);
  // Fork branches
  for(let i=0;i<3;i++){
    const idx=3+Math.floor(Math.random()*8);
    if(idx<main.pts.length){
      const p=main.pts[idx];
      makeBranch(p.x,p.y,p.z,p.y-8-Math.random()*6,5+Math.floor(Math.random()*4),2.5,1);
    }
  }
  bolts.push(group);
}

document.getElementById('weather-badge').innerHTML=`Berkeley, CA<br><span class="temp">60°F</span> <span class="cond">Clear</span><br>Cinematic WebGL Storm`;

(function animate(){
  requestAnimationFrame(animate);
  const t=performance.now()*.001;
  const dt=.016;

  // Update uniforms
  skyMat.uniforms.uT.value=t;skyMat.uniforms.uFlash.value=flashI;
  groundMat.uniforms.uT.value=t;groundMat.uniforms.uFlash.value=flashI;
  rainMat.uniforms.uFlash.value=flashI;
  splashMat.uniforms.uT.value=t;
  sfMat.uniforms.uT.value=t;sfMat.uniforms.uFlash.value=flashI;
  cloudLayers.forEach(m=>{m.uniforms.uT.value=t;m.uniforms.uFlash.value=flashI});

  // Rain — move line segments
  const rp=rainGeo.attributes.position.array;
  const wind=Math.sin(t*.12)*.06;
  for(let i=0;i<RAIN;i++){
    const i6=i*6;
    const spd=rSpeed[i];const w=rWind[i]+wind;
    // Move both vertices of each line
    rp[i6]+=w;   rp[i6+1]-=spd;   // start vertex
    rp[i6+3]+=w; rp[i6+4]-=spd;   // end vertex
    // Reset when below ground
    if(rp[i6+1]<-1){
      const nx=(Math.random()-.5)*70;
      const ny=45+Math.random()*15;
      const nz=(Math.random()-.5)*70-5;
      rp[i6]=nx;   rp[i6+1]=ny;   rp[i6+2]=nz;
      rp[i6+3]=nx+w*DROP_LEN*8; rp[i6+4]=ny+DROP_LEN; rp[i6+5]=nz;
    }
  }
  rainGeo.attributes.position.needsUpdate=true;

  // Lightning
  flashTimer-=dt;
  if(flashTimer<=0){
    flashTimer=2.5+Math.random()*5;
    flashI=.6+Math.random()*.4;
    boltLife=.5;
    createBolt((Math.random()-.5)*35,28+Math.random()*8);
  }
  flashI*=.85;
  // Fade bolts
  boltLife-=dt;
  bolts.forEach(g=>g.forEach(m=>{m.material.opacity=Math.max(0,boltLife*2)}));

  // Camera
  const sf=sY/Math.max(1,document.body.scrollHeight-innerHeight);
  cam.position.y=6-sf*3+Math.sin(t*.15)*.25;
  cam.position.x=Math.sin(t*.06)*2;
  cam.lookAt(Math.sin(t*.04)*.5, 3-sf*2, -30);
  scene.fog.density=.006+sf*.005;

  // POST-PROCESS
  postProcess(t,flashI);
})();
})();

<!-- Easter egg: Type "matrix" anywhere to unlock secret -->
<script>
(function() {
  const secretCode = 'matrix';
  let typedKeys = '';
  let typingTimer = null;

  document.addEventListener('keypress', (e) => {
    // Ignore if typing in input/textarea
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    typedKeys += e.key.toLowerCase();

    // Keep only last N characters
    if (typedKeys.length > secretCode.length) {
      typedKeys = typedKeys.slice(-secretCode.length);
    }

    if (typedKeys === secretCode) {
      // Code matched!
      const portal = document.createElement('div');
      portal.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(232,65,24,0.95),rgba(139,0,0,0.95));padding:3rem;border-radius:1rem;z-index:10000;text-align:center;box-shadow:0 0 80px rgba(232,65,24,0.8),inset 0 0 40px rgba(255,255,255,0.1);animation:pulse 2s infinite;backdrop-filter:blur(10px);max-width:90%;border:2px solid rgba(255,255,255,0.2);';

      document.body.appendChild(portal);
      typedKeys = '';
    }

    if (typingTimer) clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      typedKeys = '';
    }, 2000);
  });
})();
</script>
