<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brendon Smith — Terrain Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Albert+Sans:wght@300;400;500;600;700;800;900&family=Source+Code+Pro:wght@300;400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0f1a;--fg:#eae8e3;--fg2:rgba(234,232,227,.55);--fg3:rgba(234,232,227,.3);--accent:#34d399;--pink:#f472b6;--blue:#60a5fa;--glow:rgba(52,211,153,.12);--card-bg:rgba(255,255,255,.04);--card-border:rgba(255,255,255,.06);--line:rgba(255,255,255,.06);--display:'Albert Sans',sans-serif;--serif:'Crimson Pro',serif;--mono:'Source Code Pro',monospace}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.grain{position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
#daytime-badge{position:fixed;bottom:24px;right:24px;z-index:100;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);background:rgba(0,0,0,.4);backdrop-filter:blur(10px);padding:8px 14px;border-radius:8px;border:1px solid var(--line)}
.scroll-content{position:relative;z-index:10}
nav{position:fixed;top:0;left:0;width:100%;padding:20px 48px;display:flex;justify-content:space-between;align-items:center;z-index:200;background:rgba(12,15,26,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.logo{font-family:var(--display);font-weight:900;font-size:20px;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-mid{display:flex;gap:32px;list-style:none}
.nav-mid a{color:var(--fg2);text-decoration:none;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;transition:color .3s;padding:6px 12px;border-radius:6px}
.nav-mid a:hover{color:var(--accent);background:rgba(52,211,153,.06)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
.hamburger span{display:block;width:22px;height:2px;background:var(--fg);border-radius:1px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}.hamburger.open span:nth-child(2){opacity:0}.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;flex-direction:column;justify-content:center;align-items:center;gap:24px;opacity:0;pointer-events:none;transition:opacity .35s}
.mobile-overlay.open{opacity:1;pointer-events:all}
.mobile-overlay a{font-family:var(--display);font-size:28px;font-weight:700;color:var(--fg);text-decoration:none;opacity:0;transform:translateY(12px);transition:all .4s}
.mobile-overlay.open a{opacity:1;transform:translateY(0)}.mobile-overlay.open a:nth-child(1){transition-delay:.05s}.mobile-overlay.open a:nth-child(2){transition-delay:.1s}.mobile-overlay.open a:nth-child(3){transition-delay:.15s}.mobile-overlay.open a:nth-child(4){transition-delay:.2s}.mobile-overlay.open a:nth-child(5){transition-delay:.25s}
.mobile-overlay a:hover{color:var(--accent)}
.hero{height:100vh;display:flex;align-items:center;padding:0 48px}
.hero-tag{font-family:var(--mono);font-size:11px;letter-spacing:.25em;text-transform:uppercase;margin-bottom:24px;opacity:0;animation:fu .7s ease .4s forwards}
.hero-tag span{background:linear-gradient(90deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-h{font-family:var(--display);font-size:clamp(56px,11vw,140px);font-weight:900;line-height:.9;letter-spacing:-.04em;opacity:0;transform:translateY(40px);animation:fu 1s ease .6s forwards}
.hero-h .gl{background:linear-gradient(135deg,var(--accent),var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-h .it{font-family:var(--serif);font-style:italic;font-weight:300;-webkit-text-fill-color:var(--fg2)}
.hero-sub{font-family:var(--serif);font-size:clamp(17px,2.2vw,24px);font-weight:300;color:var(--fg2);margin-top:32px;max-width:560px;line-height:1.65;opacity:0;animation:fu .8s ease .9s forwards}
.hero-bottom{position:absolute;bottom:48px;left:48px;right:48px;display:flex;justify-content:space-between;font-size:9px;color:var(--fg3);letter-spacing:.15em;text-transform:uppercase;opacity:0;animation:fu .8s ease 1.2s forwards}
.section{padding:140px 0}
.container{max-width:1200px;margin:0 auto;padding:0 48px}
.glass{background:var(--card-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:20px;padding:56px 48px}
.slbl{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:20px;display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border-radius:20px;border:1px solid var(--card-border);background:var(--card-bg)}
.slbl span{background:linear-gradient(90deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sh{font-family:var(--display);font-size:clamp(32px,5vw,60px);font-weight:800;line-height:1.08;margin-bottom:36px;letter-spacing:-.02em}
.sh .it{font-family:var(--serif);font-style:italic;font-weight:300}
.bt{font-family:var(--display);font-weight:400;font-size:17px;line-height:1.85;color:var(--fg2);margin-bottom:22px}
.bt strong{color:var(--fg);font-weight:600}
.about-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:80px;align-items:start}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:40px}
.st{background:var(--card-bg);border:1px solid var(--card-border);padding:32px 24px;border-radius:14px;backdrop-filter:blur(8px);transition:all .4s}
.st:hover{border-color:var(--accent);box-shadow:0 0 24px var(--glow)}
.st-v{font-family:var(--display);font-size:44px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.st-l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);margin-top:10px}
.exp-item{padding:36px 0;border-top:1px solid var(--line);display:grid;grid-template-columns:150px 1fr;gap:32px;transition:all .4s;cursor:pointer}
.exp-item:last-child{border-bottom:1px solid var(--line)}
.exp-item:hover{padding-left:16px;background:linear-gradient(90deg,rgba(52,211,153,.02),transparent);border-radius:8px}
.exp-d{font-family:var(--mono);font-size:10px;color:var(--fg3);padding-top:4px}
.exp-r{font-family:var(--display);font-size:21px;font-weight:700;margin-bottom:3px}
.exp-c{font-family:var(--serif);font-style:italic;font-size:15px;margin-bottom:12px;background:linear-gradient(90deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.exp-t{font-family:var(--display);font-weight:400;font-size:14px;line-height:1.75;color:var(--fg2);max-width:520px}
.exp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.exp-tags span{font-family:var(--mono);font-size:8px;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(52,211,153,.15);color:var(--accent);border-radius:20px;background:rgba(52,211,153,.04)}
.mq-w{overflow:hidden;padding:30px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.mq-w+.mq-w{border-top:none}
.mq-t{display:flex;gap:40px;animation:mq 28s linear infinite;width:max-content}
.mq-t.rv{animation-direction:reverse;animation-duration:34s}
.mq-s{font-family:var(--display);font-size:clamp(24px,4vw,48px);font-weight:800;white-space:nowrap;color:rgba(234,232,227,.04);transition:all .4s}
.mq-s:hover{background:linear-gradient(90deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mq-d{opacity:.15;font-size:16px;align-self:center;color:var(--accent)}
.pj-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:48px}
.pj{background:var(--card-bg);border:1px solid var(--card-border);padding:48px 40px;border-radius:20px;backdrop-filter:blur(8px);transition:all .5s;cursor:pointer;overflow:hidden;position:relative}
.pj::after{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--accent),var(--pink),var(--blue));transform:scaleX(0);transform-origin:left;transition:transform .5s}
.pj:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.2),0 0 30px var(--glow)}.pj:hover::after{transform:scaleX(1)}
.pj-n{font-family:var(--display);font-size:64px;font-weight:900;background:linear-gradient(135deg,rgba(52,211,153,.06),rgba(244,114,182,.04));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:14px}
.pj-name{font-family:var(--display);font-size:24px;font-weight:700;margin-bottom:5px}
.pj-org{font-family:var(--serif);font-style:italic;font-size:14px;margin-bottom:16px;background:linear-gradient(90deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pj-desc{font-family:var(--display);font-weight:400;font-size:14px;line-height:1.8;color:var(--fg2)}
.pj-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:18px}
.pj-tags span{font-family:var(--mono);font-size:8px;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(96,165,250,.15);color:var(--blue);border-radius:20px;background:rgba(96,165,250,.04)}
.oss-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.oss-card{background:var(--card-bg);border:1px solid var(--card-border);padding:36px 28px;border-radius:20px;backdrop-filter:blur(8px);text-decoration:none;color:var(--fg);display:block;transition:all .5s}
.oss-card:hover{border-color:var(--accent);box-shadow:0 0 30px var(--glow);transform:translateY(-4px)}
.oss-badge{display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:16px;background:linear-gradient(135deg,var(--accent),var(--blue));color:var(--bg)}
.oss-icon{font-size:28px;margin-bottom:12px}.oss-name{font-family:var(--display);font-size:22px;font-weight:700;margin-bottom:4px}
.oss-tagline{font-family:var(--serif);font-style:italic;font-size:13px;margin-bottom:14px;background:linear-gradient(90deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.oss-desc{font-family:var(--display);font-weight:400;font-size:12px;line-height:1.75;color:var(--fg2);margin-bottom:14px}
.oss-stats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.oss-stats span{font-family:var(--mono);font-size:8px;padding:3px 8px;border:1px solid var(--line);color:var(--fg3);border-radius:20px}
.oss-link{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-top:12px}
.cta-h{font-family:var(--display);font-size:clamp(48px,9vw,110px);font-weight:900;line-height:.95;margin-bottom:48px}
.cta-h .it{font-family:var(--serif);font-style:italic;font-weight:300}
.cta-h .gl{background:linear-gradient(135deg,var(--accent),var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.clinks{display:flex;gap:12px;flex-wrap:wrap}
.cl{text-decoration:none;color:var(--fg2);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:12px 24px;border:1px solid var(--card-border);border-radius:12px;background:var(--card-bg);backdrop-filter:blur(8px);transition:all .3s}
.cl:hover{color:var(--accent);border-color:var(--accent);box-shadow:0 0 16px var(--glow)}
footer{padding:40px 48px;display:flex;justify-content:space-between;font-size:9px;color:var(--fg3);letter-spacing:.1em;border-top:1px solid var(--line)}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
@keyframes mq{to{transform:translateX(-50%)}}
.rv-el{opacity:0;transform:translateY(24px);transition:all .9s cubic-bezier(.23,1,.32,1)}.rv-el.vis{opacity:1;transform:translateY(0)}
@media(max-width:1080px){.container{padding:0 32px}.about-grid{gap:48px}.oss-grid{grid-template-columns:1fr 1fr}.glass{padding:40px 32px}}
@media(max-width:768px){.hamburger{display:flex}.nav-mid{display:none}.mobile-overlay{display:flex}nav{padding:16px 20px}.container{padding:0 20px}.hero{padding:0 20px}.hero-h{font-size:clamp(42px,12vw,70px)}.hero-sub{font-size:16px;max-width:100%}.hero-bottom{display:none}.section{padding:80px 0}.glass{padding:28px 20px;border-radius:14px}.about-grid{grid-template-columns:1fr;gap:32px}.stats{grid-template-columns:1fr 1fr;gap:10px}.exp-item{grid-template-columns:1fr;gap:4px;padding:24px 0}.exp-d{margin-bottom:4px}.pj-grid,.oss-grid{grid-template-columns:1fr;gap:14px}.pj{padding:32px 24px;border-radius:14px}.oss-card{padding:28px 20px;border-radius:14px}.clinks{gap:8px;flex-direction:column}.cl{text-align:center;justify-content:center}.cta-h{font-size:clamp(34px,9vw,50px)}footer{padding:24px 20px;flex-direction:column;gap:8px;text-align:center}.sh{font-size:clamp(26px,7vw,40px)}#daytime-badge{bottom:12px;right:12px;font-size:8px}}
@media(max-width:480px){.hero{padding:0 16px}.hero-h{font-size:clamp(36px,12vw,56px)}.container{padding:0 16px}.section{padding:60px 0}.glass{padding:24px 16px;border-radius:12px}.sh{font-size:clamp(22px,6vw,32px)}}
</style>
</head>
<body>
<div class="grain"></div><canvas id="c"></canvas>
<div id="daytime-badge">Scroll to cycle day → night</div>
<div class="scroll-content">
<nav><div class="logo" data-i18n="nav.logo"></div><ul class="nav-mid"><li><a href="#about" data-i18n="nav.about"></a></li><li><a href="#exp" data-i18n="nav.experience"></a></li><li><a href="#work" data-i18n="nav.work"></a></li><li><a href="#oss" data-i18n="nav.oss"></a></li><li><a href="#contact" data-i18n="nav.contact"></a></li></ul><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></nav>
<div class="mobile-overlay" id="mobileMenu"><a href="#about" class="mob-link" data-i18n="nav.about"></a><a href="#exp" class="mob-link" data-i18n="nav.experience"></a><a href="#work" class="mob-link" data-i18n="nav.projects"></a><a href="#oss" class="mob-link" data-i18n="nav.oss"></a><a href="#contact" class="mob-link" data-i18n="nav.contact"></a></div>

<section class="hero"><div><div class="hero-tag"><span data-i18n="hero.tagAlt"></span></div><h1 class="hero-h"><span class="gl" data-i18n="hero.firstName"></span><br><span class="it" data-i18n="hero.lastName"></span></h1><p class="hero-sub" data-i18n="hero.subtitle"></p></div><div class="hero-bottom"><span data-i18n="hero.scrollHint"></span><span data-i18n="hero.location"></span></div></section>

<section id="about" class="section"><div class="container"><div class="glass"><div class="about-grid"><div><div class="slbl rv-el"><span data-i18n="about.label"></span></div><h2 class="sh rv-el" data-i18n-html="about.titleAlt"></h2><p class="bt rv-el" data-i18n-html="about.bio1Alt"></p><p class="bt rv-el" data-i18n-html="about.bio2"></p></div><div><div class="stats rv-el"><div class="st"><div class="st-v" data-i18n="about.stats.years.value"></div><div class="st-l" data-i18n="about.stats.years.label"></div></div><div class="st"><div class="st-v" data-i18n="about.stats.repos.value"></div><div class="st-l" data-i18n="about.stats.repos.label"></div></div><div class="st"><div class="st-v" data-i18n="about.stats.users.value"></div><div class="st-l" data-i18n="about.stats.users.label"></div></div><div class="st"><div class="st-v" data-i18n="about.stats.ai.value"></div><div class="st-l" data-i18n-html="about.stats.ai.label"></div></div></div></div></div></div></div></section>

<section id="exp" class="section"><div class="container"><div class="glass"><div class="slbl rv-el"><span data-i18n="experience.label"></span></div><h2 class="sh rv-el" data-i18n-html="experience.title"></h2>
  <div class="exp-item rv-el"><span class="exp-d" data-i18n="experience.items.0.date"></span><div><div class="exp-r" data-i18n="experience.items.0.role"></div><div class="exp-c" data-i18n="experience.items.0.company"></div><div class="exp-t" data-i18n="experience.items.0.description"></div><div class="exp-tags"><span data-i18n="experience.items.0.tags.0"></span><span data-i18n="experience.items.0.tags.1"></span><span data-i18n="experience.items.0.tags.2"></span><span data-i18n="experience.items.0.tags.3"></span><span data-i18n="experience.items.0.tags.4"></span><span data-i18n="experience.items.0.tags.5"></span><span data-i18n="experience.items.0.tags.6"></span></div></div></div>
  <div class="exp-item rv-el"><span class="exp-d" data-i18n="experience.items.1.date"></span><div><div class="exp-r" data-i18n="experience.items.1.role"></div><div class="exp-c" data-i18n="experience.items.1.company"></div><div class="exp-t" data-i18n="experience.items.1.description"></div><div class="exp-tags"><span data-i18n="experience.items.1.tags.0"></span><span data-i18n="experience.items.1.tags.1"></span><span data-i18n="experience.items.1.tags.2"></span></div></div></div>

<div class="exp-item rv-el"><span class="exp-d" data-i18n="experience.items.2.date"></span><div><div class="exp-r" data-i18n="experience.items.2.role"></div><div class="exp-c" data-i18n="experience.items.2.company"></div><div class="exp-t" data-i18n="experience.items.2.descriptionAlt"></div><div class="exp-tags"><span data-i18n="experience.items.2.tags.0"></span><span data-i18n="experience.items.2.tags.1"></span><span data-i18n="experience.items.2.tags.2"></span></div></div></div>
<div class="exp-item rv-el"><span class="exp-d" data-i18n="experience.items.3.date"></span><div><div class="exp-r" data-i18n="experience.items.3.role"></div><div class="exp-c" data-i18n="experience.items.3.company"></div><div class="exp-t" data-i18n="experience.items.3.descriptionAlt"></div><div class="exp-tags"><span data-i18n="experience.items.3.tags.0"></span><span data-i18n="experience.items.3.tags.1"></span><span data-i18n="experience.items.3.tags.2"></span></div></div></div>
<div class="exp-item rv-el"><span class="exp-d" data-i18n="experience.items.4.date"></span><div><div class="exp-r" data-i18n="experience.items.4.role"></div><div class="exp-c" data-i18n="experience.items.4.company"></div><div class="exp-t" data-i18n="experience.items.4.descriptionAlt"></div><div class="exp-tags"><span data-i18n="experience.items.4.tags.0"></span><span data-i18n="experience.items.4.tags.1"></span><span data-i18n="experience.items.4.tags.2"></span></div></div></div>
</div></div></section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
// PROCEDURAL TERRAIN + WATER + DAY/NIGHT CYCLE
// Noise-based heightmap, animated water, fog, scroll-driven sun
// ═══════════════════════════════════════════════
(()=>{
const canvas=document.getElementById('c');
const R=new THREE.WebGLRenderer({canvas,antialias:true});
R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));
R.toneMapping=THREE.ACESFilmicToneMapping;
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,500);
cam.position.set(0,12,25);cam.lookAt(0,0,-10);

// Simplex-like hash noise
function hash(x,y){return Math.sin(x*127.1+y*311.7)*43758.5453%1}
function noise2D(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=x-ix,fy=y-iy;
  const sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);
  const a=hash(ix,iy),b=hash(ix+1,iy),c=hash(ix,iy+1),d=hash(ix+1,iy+1);
  return a+(b-a)*sx+(c-a)*sy+(a-b-c+d)*sx*sy;
}
function fbm(x,y){return noise2D(x,y)*.5+noise2D(x*2,y*2)*.25+noise2D(x*4,y*4)*.125}

// ── Terrain ──
const tW=80,tD=80,tSeg=120;
const tGeo=new THREE.PlaneGeometry(tW,tD,tSeg,tSeg);
tGeo.rotateX(-Math.PI/2);
const verts=tGeo.attributes.position.array;
for(let i=0;i<verts.length;i+=3){
  const x=verts[i],z=verts[i+2];
  verts[i+1]=fbm(x*.06,z*.06)*8-2;
}
tGeo.computeVertexNormals();
const tMat=new THREE.ShaderMaterial({
  uniforms:{uSunY:{value:.5},uT:{value:0}},
  vertexShader:`varying vec3 vN,vP;void main(){vN=normalize(normalMatrix*normal);vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    varying vec3 vN,vP;uniform float uSunY,uT;
    void main(){
      vec3 sunDir=normalize(vec3(.3,uSunY,.5));
      float diff=max(dot(vN,sunDir),0.);
      // Height-based coloring
      float h=(vP.y+2.)/8.;
      vec3 lowland=vec3(.08,.15,.06);vec3 mid=vec3(.12,.2,.08);vec3 peak=vec3(.4,.38,.35);vec3 snow=vec3(.7,.72,.75);
      vec3 base=h<.3?mix(lowland,mid,h/.3):h<.7?mix(mid,peak,(h-.3)/.4):mix(peak,snow,(h-.7)/.3);
      // Day/night color
      vec3 dayLight=vec3(1.,.95,.85);vec3 nightLight=vec3(.1,.12,.25);
      float dayFactor=smoothstep(-.1,.3,uSunY);
      vec3 light=mix(nightLight,dayLight,dayFactor);
      vec3 col=base*(diff*.6+.4)*light;
      // Distance fog
      float dist=length(vP.xz);
      vec3 fogCol=mix(vec3(.05,.07,.15),vec3(.5,.55,.7),dayFactor);
      col=mix(col,fogCol,smoothstep(15.,40.,dist));
      gl_FragColor=vec4(col,1.);
    }`
});
scene.add(new THREE.Mesh(tGeo,tMat));

// ── Water ──
const wGeo=new THREE.PlaneGeometry(80,80,60,60);
wGeo.rotateX(-Math.PI/2);
const wMat=new THREE.ShaderMaterial({
  uniforms:{uT:{value:0},uSunY:{value:.5}},
  vertexShader:`varying vec2 vUv;varying vec3 vP;uniform float uT;
    void main(){vUv=uv;vec3 p=position;p.y=-1.5+sin(p.x*.3+uT)*.15+cos(p.z*.4+uT*.7)*.1;vP=p;gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);}`,
  fragmentShader:`
    varying vec2 vUv;varying vec3 vP;uniform float uT,uSunY;
    void main(){
      float dayFactor=smoothstep(-.1,.3,uSunY);
      vec3 dayWater=vec3(.1,.2,.4);vec3 nightWater=vec3(.02,.04,.1);
      vec3 col=mix(nightWater,dayWater,dayFactor);
      // Specular highlight from sun
      float spec=pow(max(sin(vP.x*.5+uT)*cos(vP.z*.3+uT*.5),0.),8.);
      col+=vec3(1.,.9,.6)*spec*dayFactor*.3;
      // Fresnel edge
      float dist=length(vP.xz);
      vec3 fogCol=mix(vec3(.05,.07,.15),vec3(.5,.55,.7),dayFactor);
      col=mix(col,fogCol,smoothstep(15.,40.,dist));
      gl_FragColor=vec4(col,.7);
    }`,
  transparent:true,depthWrite:false
});
scene.add(new THREE.Mesh(wGeo,wMat));

// ── Sky dome ──
const skyGeo=new THREE.SphereGeometry(100,32,32);
const skyMat=new THREE.ShaderMaterial({
  uniforms:{uSunY:{value:.5}},
  side:THREE.BackSide,
  vertexShader:`varying vec3 vD;void main(){vD=normalize(position);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    varying vec3 vD;uniform float uSunY;
    void main(){
      float dayFactor=smoothstep(-.1,.4,uSunY);
      // Day sky
      vec3 dayTop=vec3(.3,.5,.9);vec3 dayHorizon=vec3(.7,.75,.85);
      // Night sky
      vec3 nightTop=vec3(.01,.02,.06);vec3 nightHorizon=vec3(.03,.04,.08);
      // Sunset band
      vec3 sunsetCol=vec3(.9,.4,.15);
      float sunset=smoothstep(.1,.4,uSunY)*smoothstep(.6,.3,uSunY);
      vec3 top=mix(nightTop,dayTop,dayFactor);
      vec3 horizon=mix(nightHorizon,dayHorizon,dayFactor);
      horizon=mix(horizon,sunsetCol,sunset*.6);
      float h=max(vD.y,0.);
      vec3 col=mix(horizon,top,h);
      // Sun disc
      vec3 sunDir=normalize(vec3(.3,uSunY,.5));
      float sunDot=max(dot(vD,sunDir),0.);
      col+=vec3(1.,.9,.5)*pow(sunDot,64.)*dayFactor;
      col+=vec3(1.,.6,.2)*pow(sunDot,8.)*.3*dayFactor;
      // Stars at night
      float star=pow(fract(sin(dot(floor(vD*200.),vec3(127.1,311.7,74.7)))*43758.5),20.)*(1.-dayFactor);
      col+=star*.8;
      gl_FragColor=vec4(col,1.);
    }`
});
scene.add(new THREE.Mesh(skyGeo,skyMat));

// ── Fog particles ──
const fogGeo=new THREE.BufferGeometry();
const fCount=200;const fPos=new Float32Array(fCount*3),fSz=new Float32Array(fCount);
for(let i=0;i<fCount;i++){fPos[i*3]=(Math.random()-.5)*60;fPos[i*3+1]=Math.random()*4;fPos[i*3+2]=(Math.random()-.5)*60;fSz[i]=2+Math.random()*4}
fogGeo.setAttribute('position',new THREE.BufferAttribute(fPos,3));
fogGeo.setAttribute('size',new THREE.BufferAttribute(fSz,1));
const fogMat=new THREE.ShaderMaterial({
  uniforms:{uSunY:{value:.5}},
  vertexShader:`attribute float size;varying float vA;uniform float uSunY;void main(){vA=smoothstep(-.1,.3,uSunY);vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=size*(200./-mv.z);gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`varying float vA;void main(){float d=length(gl_PointCoord-.5);float a=exp(-d*d*3.);gl_FragColor=vec4(vec3(.5,.55,.6)*vA+vec3(.1,.1,.15)*(1.-vA),a*.08);}`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(fogGeo,fogMat));

let sY=0;
addEventListener('scroll',()=>{sY=pageYOffset});
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});

const badge=document.getElementById('daytime-badge');

(function animate(){
  requestAnimationFrame(animate);
  const t=performance.now()*.001;
  const maxS=Math.max(1,document.body.scrollHeight-innerHeight);
  const sf=sY/maxS;

  // Sun position driven by scroll (0=noon, 1=midnight)
  const sunY=Math.cos(sf*Math.PI)*.8; // goes from .8 (day) to -.8 (night)
  tMat.uniforms.uSunY.value=sunY;
  tMat.uniforms.uT.value=t;
  wMat.uniforms.uT.value=t;
  wMat.uniforms.uSunY.value=sunY;
  skyMat.uniforms.uSunY.value=sunY;
  fogMat.uniforms.uSunY.value=sunY;

  // Badge update
  const dayPct=Math.round(smoothstep(-.1,.3,sunY)*100);
  function smoothstep(a,b,x){const t=Math.max(0,Math.min(1,(x-a)/(b-a)));return t*t*(3-2*t)}
  const timeLabel=dayPct>70?'Day':dayPct>30?'Sunset':'Night';
  badge.textContent=`${timeLabel} — Scroll controls time of day`;

  // Gentle camera sway
  cam.position.x=Math.sin(t*.1)*2;
  cam.position.y=12-sf*4+Math.sin(t*.15)*.3;
  cam.lookAt(0,0,-10-sf*5);

  R.render(scene,cam);
})();
})();

(()=>{
  const obs=new IntersectionObserver(e=>{e.forEach((en,i)=>{if(en.isIntersecting){setTimeout(()=>en.target.classList.add('vis'),i*50);obs.unobserve(en.target)}})},{threshold:.06});
  document.querySelectorAll('.rv-el').forEach(el=>obs.observe(el));
  const btn=document.getElementById('hamburger'),ov=document.getElementById('mobileMenu');
  btn.addEventListener('click',()=>{btn.classList.toggle('open');ov.classList.toggle('open');document.body.style.overflow=ov.classList.contains('open')?'hidden':''});
  ov.querySelectorAll('.mob-link').forEach(l=>{l.addEventListener('click',e=>{e.preventDefault();btn.classList.remove('open');ov.classList.remove('open');document.body.style.overflow='';document.querySelector(l.getAttribute('href'))?.scrollIntoView({behavior:'smooth'})})});
  document.querySelectorAll('nav a[href^="#"]').forEach(a=>{a.addEventListener('click',e=>{e.preventDefault();document.querySelector(a.getAttribute('href'))?.scrollIntoView({behavior:'smooth'})})});
})();
</script>
