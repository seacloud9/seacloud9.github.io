<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brendon Smith — Loading Experience...</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}
#canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}
.loader-container{
  position:relative;
  z-index:1;
  text-align:center;
  padding:48px;
  max-width:600px;
}
.logo{
  font-size:clamp(40px,10vw,72px);
  font-weight:800;
  letter-spacing:-0.03em;
  margin-bottom:32px;
  background:linear-gradient(135deg,#00ffff,#ff00ff,#ffff00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 3s ease-in-out infinite,fadeIn 0.8s ease forwards;
  background-size:200% 200%;
  opacity:0;
}
@keyframes shimmer{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
@keyframes fadeIn{
  to{opacity:1}
}
.tagline{
  font-size:clamp(15px,3.5vw,20px);
  color:rgba(255,255,255,0.6);
  margin-bottom:56px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  font-weight:500;
  animation:fadeIn 0.8s ease 0.2s forwards;
  opacity:0;
}
.spinner-wrapper{
  margin:0 auto 40px;
  width:80px;
  height:80px;
  position:relative;
  animation:fadeIn 0.8s ease 0.4s forwards;
  opacity:0;
}
.spinner{
  width:100%;
  height:100%;
  position:relative;
}
.spinner::before,
.spinner::after{
  content:'';
  position:absolute;
  inset:0;
  border:3px solid transparent;
  border-radius:50%;
}
.spinner::before{
  border-top-color:#00ffff;
  border-right-color:#00ffff;
  animation:spin 1.2s cubic-bezier(0.68,-0.55,0.265,1.55) infinite;
}
.spinner::after{
  border-top-color:#ff00ff;
  border-left-color:#ff00ff;
  animation:spin 1.8s cubic-bezier(0.68,-0.55,0.265,1.55) infinite reverse;
}
.spinner-center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:24px;
  height:24px;
  background:linear-gradient(135deg,#00ffff,#ff00ff);
  border-radius:50%;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes spin{
  to{transform:rotate(360deg)}
}
@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}
  50%{transform:translate(-50%,-50%) scale(1.3);opacity:0.7}
}
.message{
  font-size:clamp(13px,3vw,16px);
  color:rgba(255,255,255,0.5);
  letter-spacing:0.1em;
  font-weight:500;
  margin-bottom:24px;
  animation:fadeIn 0.8s ease 0.6s forwards;
  opacity:0;
}
.version-hint{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(11px,2.5vw,13px);
  color:rgba(255,255,255,0.4);
  letter-spacing:0.08em;
  padding:12px 24px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  display:inline-block;
  animation:fadeIn 0.8s ease 0.8s forwards,float 3s ease-in-out infinite;
  opacity:0;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
.progress-bar{
  width:100%;
  height:3px;
  background:rgba(255,255,255,0.1);
  border-radius:2px;
  overflow:hidden;
  margin-top:48px;
  animation:fadeIn 0.8s ease 1s forwards;
  opacity:0;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#00ffff,#ff00ff,#ffff00);
  border-radius:2px;
  animation:progress 2s ease forwards;
  transform-origin:left;
}
@keyframes progress{
  from{transform:scaleX(0)}
  to{transform:scaleX(1)}
}
@media(max-width:768px){
  .loader-container{
    padding:32px 24px;
  }
  .spinner-wrapper{
    width:64px;
    height:64px;
    margin-bottom:32px;
  }
  .spinner::before,
  .spinner::after{
    border-width:2px;
  }
  .spinner-center{
    width:20px;
    height:20px;
  }
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="loader-container">
  <div class="logo" data-i18n="nav.logo"></div>
  <div class="tagline" data-i18n="hero.tag"></div>
  <div class="spinner-wrapper">
    <div class="spinner"></div>
    <div class="spinner-center"></div>
  </div>
  <div class="message" id="loadingMessage" data-i18n="loading.initializing"></div>
  <div class="version-hint" id="versionHint" data-i18n="loading.hint"></div>
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// RANDOM PORTFOLIO LOADER WITH PARTICLE BACKGROUND
// Randomly selects from all index.html variants
// ═══════════════════════════════════════════════════════════════

// Background particle animation
(()=>{
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  let w=canvas.width=innerWidth;
  let h=canvas.height=innerHeight;

  const particles=[];
  const particleCount=window.innerWidth<768?50:100;

  class Particle{
    constructor(){
      this.x=Math.random()*w;
      this.y=Math.random()*h;
      this.vx=(Math.random()-0.5)*0.6;
      this.vy=(Math.random()-0.5)*0.6;
      this.radius=Math.random()*2.5+0.5;
      this.hue=Math.random()*360;
      this.opacity=Math.random()*0.5+0.3;
    }
    update(){
      this.x+=this.vx;
      this.y+=this.vy;
      if(this.x<0||this.x>w)this.vx*=-1;
      if(this.y<0||this.y>h)this.vy*=-1;
      this.hue=(this.hue+0.3)%360;
    }
    draw(){
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
      ctx.fillStyle=`hsla(${this.hue},85%,65%,${this.opacity})`;
      ctx.fill();

      // Glow effect
      const gradient=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius*3);
      gradient.addColorStop(0,`hsla(${this.hue},85%,65%,${this.opacity*0.5})`);
      gradient.addColorStop(1,`hsla(${this.hue},85%,65%,0)`);
      ctx.fillStyle=gradient;
      ctx.fill();
    }
  }

  for(let i=0;i<particleCount;i++){
    particles.push(new Particle());
  }

  function animate(){
    ctx.fillStyle='rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,w,h);

    particles.forEach((p,i)=>{
      p.update();
      p.draw();

      // Connect nearby particles with gradient lines
      particles.slice(i+1).forEach(p2=>{
        const dx=p.x-p2.x;
        const dy=p.y-p2.y;
        const dist=Math.sqrt(dx*dx+dy*dy);

        if(dist<120){
          const gradient=ctx.createLinearGradient(p.x,p.y,p2.x,p2.y);
          const opacity=0.15*(1-dist/120);
          gradient.addColorStop(0,`hsla(${p.hue},85%,65%,${opacity})`);
          gradient.addColorStop(1,`hsla(${p2.hue},85%,65%,${opacity})`);

          ctx.beginPath();
          ctx.moveTo(p.x,p.y);
          ctx.lineTo(p2.x,p2.y);
          ctx.strokeStyle=gradient;
          ctx.lineWidth=1;
          ctx.stroke();
        }
      });
    });

    requestAnimationFrame(animate);
  }

  animate();

  addEventListener('resize',()=>{
    w=canvas.width=innerWidth;
    h=canvas.height=innerHeight;
  });
})();

// Random portfolio selector
(()=>{
  const portfolioVersions=[
    {url:'holographic-theme/',name:'Holographic Theme Edition'},
    {url:'storm-edition/',name:'Storm Edition'},
    {url:'terrain-edition/',name:'Terrain Edition'},
    {url:'vaporwave-circuit/',name:'Vaporwave Circuit Edition'},
    {url:'neural-network/',name:'Neural Network Edition'},
    {url:'ocean-depths/',name:'Ocean Depths Edition'}
  ];

  // Select random version
  const randomVersion=portfolioVersions[Math.floor(Math.random()*portfolioVersions.length)];

  // Display which version is loading
  const versionHint=document.getElementById('versionHint');

  // Animate the text reveal
  setTimeout(()=>{
    versionHint.textContent=randomVersion.name;
  },500);

  // Redirect after delay for smooth loading experience
  setTimeout(()=>{
    window.location.href=randomVersion.url;
  },2200);
})();
</script>

<!-- i18n System -->
<script src="./i18n/config.js"></script>
<script src="./i18n/i18n.js"></script>
<script>
  // Initialize i18n with auto-detected configuration
  i18n.init(i18nConfig).then(() => {
    // Update loading message after i18n loads
    setTimeout(() => {
      const loadingMsg = document.getElementById('loadingMessage');
      if (loadingMsg) {
        loadingMsg.setAttribute('data-i18n', 'loading.selecting');
        i18n.applyTranslations();
      }
    }, 100);
  });
</script>
</body>
</html>
